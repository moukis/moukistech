<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Test Hello World</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f172a, #2563eb);
        color: #f8fafc;
      }
      .card {
        background: rgba(15, 23, 42, 0.82);
        padding: 2rem 2.5rem;
        border-radius: 1rem;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.28);
        text-align: center;
        max-width: 480px;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 2rem;
      }
      p {
        margin: 0;
        line-height: 1.6;
        color: #cbd5e1;
      }
      .pill {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.6rem 1rem;
        border-radius: 999px;
        background: #38bdf8;
        color: #082f49;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello World</h1>
      <p>Bienvenue sur la page de test d’accueil créée séparément sans toucher au code existant.</p>
      <div class="pill">Page de test OK</div>
    </main>
  </body>
</html>
